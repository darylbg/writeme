<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.7.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <title>WRITEme</title>
</head>
<body>
    <div class="heading">
        <h5 class="instructions">Search your Github Username → Select the Repository → Generate a README file for that repository</h5>
    </div>
    <section class="inputs-section">
        <div class="reset-button-div">
            <button type="button" class="btn btn-primary" id="reset-btn"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <div class="username-search-div">
            <div class="input-group mb-3">
                <input id="username-search" type="text" class="form-control" placeholder="Github username" aria-label="Search" aria-describedby="basic-addon2">
                <div class="input-group-append">
                <button id="username-search-btn" class="btn btn-outline-secondary" type="button"><i class="bi bi-search"></i></button>
                </div>
            </div>
        </div>
        <div class="repo-search">
            <input type="text" id="search-box" placeholder="Search repo...">
            <ul id="repo-list"></ul>
        </div>
        <div class="generate-button-div">
            <button type="button" class="btn btn-primary" id="readme-generate-btn">
                <p>Generate</p>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-filetype-md" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M14 4.5V14a2 2 0 0 1-2 2H9v-1h3a1 1 0 0 0 1-1V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v9H2V2a2 2 0 0 1 2-2h5.5L14 4.5ZM.706 13.189v2.66H0V11.85h.806l1.14 2.596h.026l1.14-2.596h.8v3.999h-.716v-2.66h-.038l-.946 2.159h-.516l-.952-2.16H.706Zm3.919 2.66V11.85h1.459c.406 0 .741.078 1.005.234.263.157.46.383.589.68.13.297.196.655.196 1.075 0 .422-.066.784-.196 1.084-.131.301-.33.53-.595.689-.264.158-.597.237-1 .237H4.626Zm1.353-3.354h-.562v2.707h.562c.186 0 .347-.028.484-.082a.8.8 0 0 0 .334-.252 1.14 1.14 0 0 0 .196-.422c.045-.168.067-.365.067-.592a2.1 2.1 0 0 0-.117-.753.89.89 0 0 0-.354-.454c-.159-.102-.362-.152-.61-.152Z"/>
                </svg>
            </button>
        </div>
    </section>
    <div class="readme-section">
        <div class="col-12 code-block">
            <pre class="pre">
                <code class="language-html" id="generated-text"></code>
            </pre>
            <div id="loading">
                <img src="assets/images/loading-gif.gif" alt="Loading..." />
              </div>
            <button class="copy-button">Copy</button>
        </div>
    </div>   

    <!-- jquery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js" integrity="sha512-STof4xm1wgkfm7heWqFJVn58Hm3EtS31XFaagaa8VMReCXAkQnJZ+jEy8PCC/iT18dFy95WcExNHFTqLyp72eQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- bootstrap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/js/bootstrap.min.js" integrity="sha512-1/RvZTcCDEUjY/CypiMz+iqqtaoQfAITmNSJY17Myp4Ms5mdxPS5UV7iOfdZoxcGhzFbOm6sntTKJppjvuhg4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- local javascript file -->
    <script src="assets/js/script.js"></script>
</body>
</html>
